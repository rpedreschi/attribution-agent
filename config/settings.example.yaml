# DeltaStream Attribution Agent — configuration template.
# Copy to config/settings.yaml (gitignored) and fill in, or supply any value
# via the matching UPPER_SNAKE env var (takes precedence). ${VAR} references in
# this file are expanded from the environment so secrets stay out of the file.
#
# Architecture:
#   datagen (local) -> Confluent Cloud (Kafka) -> DeltaStream (streams + MVs)
#   -> DeltaStream MCP endpoint -> interactive agent -> xlsx

customer:
  id: acme_cloud
  display_name: "Acme Cloud"
  fiscal_period: "2026-Q1"

kafka:
  # WarpStream (or any Kafka-API) cluster. SASL_SSL + PLAIN.
  bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS}"
  security_protocol: "SASL_SSL"
  sasl_mechanism: "PLAIN"
  sasl_username: "${KAFKA_API_KEY}"
  sasl_password: "${KAFKA_API_SECRET}"
  # PEM CA file if the broker uses a custom root (WarpStream does). Leave empty
  # for public-CA brokers. The producer + admin client pass it to librdkafka.
  ssl_ca_location: "${KAFKA_SSL_CA_LOCATION}"
  topics:
    salesforce_accounts: "rachel_salesforce_cdc_accounts"
    salesforce_contacts: "rachel_salesforce_cdc_contacts"
    salesforce_opportunities: "rachel_salesforce_cdc_opportunities"
    hubspot: "rachel_hubspot_events"
    ga4: "rachel_ga4_events"
    linkedin_ads: "rachel_linkedin_ads"
    google_ads: "rachel_google_ads"
    outreach: "rachel_outreach_activity"
    channel_cost: "rachel_channel_cost"
    share_of_model: "rachel_share_of_model"

deltastream:
  # DeltaStream MCP REST endpoint. Materialized views the token's role can
  # SELECT are auto-exposed as MCP tools. See deltastream/ for the SQL and the
  # CREATE API_TOKEN step.
  mcp_endpoint: "https://api-mizaz8.deltastream.io/mcp/v1"   # your org's REST endpoint
  api_token: "${DELTASTREAM_API_TOKEN}"   # CREATE API_TOKEN bound to the role below
  organization: "${DELTASTREAM_ORG}"
  role: "attribution_reader"
  database: "attribution"
  schema_name: "public"

agent:
  # Local interactive CLI -> "anthropic". AgentCore deployment -> "bedrock".
  llm_backend: "anthropic"
  anthropic_model_id: "claude-sonnet-4-6"
  anthropic_api_key: "${ANTHROPIC_API_KEY}"
  aws_region: "us-east-2"
  bedrock_model_id: "us.anthropic.claude-sonnet-4-6-v1:0"
  guardrails:
    max_weekly_reallocation_pct: 0.20
    min_conversions_trailing_90d: 3   # min trailing won deals to reallocate a channel
    excluded_channels: ["Brand", "Events", "AI Assistant"]   # AI Assistant has no media lever to reallocate
    attribution_model_for_decisions: "time_decay"

output:
  directory: "out"
  filename_template: "{customer_id}_attribution_{fiscal_period}.xlsx"
