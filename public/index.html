<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeltaStream Pulse — Attribution</title>
<style>
  :root{
    --nav:#0a1024; --nav-2:#111a33; --nav-text:#9aa3ba; --nav-label:#5b6580;
    --blue:#2f6bff; --blue-ink:#1f49c9;
    --ink:#161d2b; --ink-2:#5a6478; --line:#e9ebf1; --bg:#ffffff; --card:#ffffff;
    --soft:#f4f6fb; --green:#15a34a; --amber:#b9791a; --amber-bg:#fdf1dd;
    --green-bg:#e7f6ec; --gray-bg:#eef0f5; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  /* sidebar */
  .side{background:var(--nav);color:var(--nav-text);padding:22px 16px;display:flex;flex-direction:column}
  .brand{color:#fff;font-weight:700;font-size:15px;letter-spacing:.2px;padding:0 8px 22px}
  .brand small{display:block;color:var(--nav-label);font-weight:500;font-size:11px;margin-top:2px}
  .navlabel{color:var(--nav-label);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:16px 8px 8px}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--nav-text);
    font-size:13.5px;cursor:pointer;user-select:none}
  .navitem .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.6}
  .navitem:hover{background:var(--nav-2);color:#cfd6e6}
  .navitem.active{background:var(--blue);color:#fff}
  .navitem.active .dot{opacity:1}
  .side .foot{margin-top:auto;color:var(--nav-label);font-size:11.5px;line-height:1.5;padding:12px 8px 0}
  /* main */
  .main{min-width:0;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;gap:14px;padding:16px 28px;border-bottom:1px solid var(--line)}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--soft);border:1px solid var(--line);
    border-radius:999px;padding:7px 13px;font-size:12.5px;color:var(--ink-2)}
  .chip .live{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 3px rgba(47,107,255,.18)}
  .spark{display:flex;align-items:flex-end;gap:2px;height:20px}
  .spark i{width:3px;background:#c3ccdd;border-radius:1px}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:12px;color:var(--ink-2);font-size:12.5px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-size:13px;
    cursor:pointer;color:var(--ink)}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .content{padding:26px 30px;max-width:1180px}
  .eyebrow{color:var(--blue);font-weight:700;font-size:12px;letter-spacing:.13em;text-transform:uppercase}
  h1{font-size:30px;margin:6px 0 6px;letter-spacing:-.02em}
  .sub{color:var(--ink-2);font-size:14.5px;margin:0 0 22px}
  .section{margin-top:30px}
  .section h2{font-size:19px;margin:0 0 4px;letter-spacing:-.01em}
  .section .note{color:var(--ink-2);font-size:13.5px;margin:0 0 14px}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .kpi{border:1px solid var(--line);border-radius:14px;padding:18px}
  .kpi .lab{color:var(--ink-2);font-size:13px}
  .kpi .val{font-size:31px;font-weight:700;letter-spacing:-.02em;margin:8px 0 6px}
  .kpi .delta{font-family:var(--mono);font-size:12.5px}
  .kpi .delta.up{color:var(--green)} .kpi .delta.down{color:var(--amber)}
  .kpi .st{font-family:var(--mono);color:var(--ink-2);font-size:12px;margin-top:8px}
  /* change cards */
  .cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .ccard{border:1px solid var(--line);border-radius:14px;padding:18px}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.1em;padding:4px 8px;border-radius:6px}
  .b-drift{background:#eaf0ff;color:var(--blue-ink)} .b-new{background:#eaf0ff;color:var(--blue-ink)}
  .b-low{background:var(--gray-bg);color:#555f73}
  .ccard p{margin:12px 0 0;font-size:13.5px;line-height:1.5;color:#333c4d}
  .ill{font-size:10.5px;color:var(--amber);border:1px solid var(--amber-bg);background:var(--amber-bg);
    border-radius:5px;padding:1px 6px;margin-left:6px}
  /* money bars */
  .bars{border:1px solid var(--line);border-radius:14px;padding:8px 18px}
  .bar{display:grid;grid-template-columns:150px 1fr 70px;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--soft)}
  .bar:last-child{border-bottom:0}
  .bar .nm{font-weight:600;font-size:13.5px}
  .track{height:9px;background:#eef1f7;border-radius:6px;overflow:hidden}
  .track>i{display:block;height:100%;background:linear-gradient(90deg,#5b8bff,#2f6bff);border-radius:6px}
  .bar .amt{text-align:right;font-variant-numeric:tabular-nums;font-size:13.5px;color:#2a3243}
  /* model compare */
  table{width:100%;border-collapse:collapse}
  .mtable{border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .mhead{background:var(--soft);color:var(--ink-2);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    padding:12px 18px;display:grid;grid-template-columns:210px 1fr;gap:14px}
  .mrow{display:grid;grid-template-columns:210px 1fr;gap:14px;padding:16px 18px;border-top:1px solid var(--line)}
  .mrow .ch{font-weight:700;font-size:14px;display:flex;flex-direction:column;gap:8px}
  .tag{align-self:flex-start;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px}
  .t-spread{background:var(--amber-bg);color:var(--amber)} .t-agree{background:var(--green-bg);color:var(--green)}
  .t-thin{background:var(--gray-bg);color:#5b6274}
  .mmodels{display:flex;flex-direction:column;gap:9px}
  .mm{display:grid;grid-template-columns:120px 1fr 46px;align-items:center;gap:12px;color:var(--ink-2);font-size:12.5px}
  .mm .mt{height:8px;background:#eef1f7;border-radius:5px;overflow:hidden}
  .mm .mt>i{display:block;height:100%;background:#9db4f2;border-radius:5px}
  .mm b{color:var(--ink);text-align:right;font-variant-numeric:tabular-nums}
  .tabs{display:flex;gap:22px;border-bottom:1px solid var(--line);margin:6px 0 20px}
  .tab{padding:10px 2px;font-size:14px;color:var(--ink-2);cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--blue);border-color:var(--blue);font-weight:600}
  /* agent */
  .rec{border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:12px;padding:18px 20px;
    margin-bottom:16px;display:grid;grid-template-columns:1fr 170px;gap:16px}
  .rec.hold{border-left-color:var(--amber)}
  .rec h3{margin:0 0 6px;font-size:16px}
  .rec p{margin:0;color:#333c4d;font-size:13.5px;line-height:1.5}
  .basis{font-family:var(--mono);font-size:12px;background:var(--soft);border-radius:8px;padding:10px 12px;
    margin-top:12px;color:#39435a;line-height:1.5}
  .rec .side2{display:flex;flex-direction:column;align-items:flex-end;gap:9px}
  .conf{font-family:var(--mono);font-size:11.5px;color:var(--ink-2)}
  .rec .btn{width:150px;text-align:center}
  .auto{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:20px}
  .auto h3{margin:0 0 6px;color:var(--blue-ink);font-size:16px}
  .auto p{margin:0 0 14px;color:#333c4d;font-size:13.5px;line-height:1.5}
  /* ledger */
  .ltable{border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .ltable th{ text-align:left;background:#fff;color:var(--ink-2);font-size:11px;letter-spacing:.09em;
    text-transform:uppercase;font-weight:600;padding:14px 18px;border-bottom:1px solid var(--line)}
  .ltable td{padding:15px 18px;border-top:1px solid var(--soft);font-size:13.5px;vertical-align:top}
  .ltable td.when{font-family:var(--mono);color:var(--ink-2);font-size:12.5px;white-space:nowrap}
  .ltable td.ev{font-weight:600}
  .actor{font-size:10.5px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:6px;background:#eaf0ff;color:var(--blue-ink)}
  .actor.SYSTEM{background:var(--gray-bg);color:#556}
  .actor.HUMAN{background:var(--green-bg);color:var(--green)}
  .hide{display:none}
  @media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}.kpis,.cards3{grid-template-columns:1fr 1fr}}
</style>
</head>

const money = n => n==null ? "—" :
  Math.abs(n)>=1e6 ? "$"+(n/1e6).toFixed(1)+"M" : Math.abs(n)>=1e3 ? "$"+(n/1e3).toFixed(1)+"K" : "$"+Math.round(n);
const pct = f => (f*100).toFixed(0)+"%";
const esc = s => String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function ago(iso){const s=Math.max(0,Math.round((Date.now()-Date.parse(iso))/1000));
  return s<60?s+"s ago":s<3600?Math.round(s/60)+"m ago":Math.round(s/3600)+"h ago";}

function chrome(){
  const m=BOARD.meta;
  document.getElementById("brandSub").textContent=m.customer;
  document.getElementById("recomputed").textContent="Recomputed "+ago(m.recomputed_at);
  document.getElementById("eps").textContent=m.events_per_sec.toLocaleString()+" events/sec";
  document.getElementById("foot").innerHTML=esc(m.customer)+", "+esc(m.environment)+"<br>"+m.sources_streaming+" sources streaming";
  const rev=(BOARD.trends.revenue||[]).slice(-24), mx=Math.max(1,...rev.map(p=>p.revenue));
  document.getElementById("spark").innerHTML=rev.map(p=>`<i style="height:${4+16*p.revenue/mx}px"></i>`).join("");
}

function kpi(k){
  const val=k.format==="months"?(k.value==null?"—":k.value+" mo"):money(k.value);
  const d=k.delta_pct==null?"":`<div class="delta ${k.delta_pct>=0?"up":"down"}">${k.delta_pct>=0?"+":""}${k.delta_pct}% ${esc(k.delta_label)}</div>`;
  return `<div class="kpi"><div class="lab">${esc(k.label)}</div><div class="val">${val}</div>${d}<div class="st">${esc(k.subtext||"")}</div></div>`;
}
function changeCard(c){
  const b={drift:"b-drift",new:"b-new",low_confidence:"b-low"}[c.kind]||"b-low";
  const lab={drift:"DRIFT",new:"NEW",low_confidence:"LOW CONFIDENCE"}[c.kind]||c.kind.toUpperCase();
  return `<div class="ccard"><span class="badge ${b}">${lab}</span>${c.real?"":'<span class="ill">illustrative</span>'}<p>${esc(c.body)}</p></div>`;
}
function liveBoard(){
  const lb=BOARD.live_board, mx=Math.max(1,...lb.money_by_channel.map(r=>r.revenue));
  return `<div class="eyebrow">Live board</div><h1>${esc(BOARD.meta.period_label)}</h1>
    <p class="sub">Attribution recomputed continuously from the source event streams.</p>
    <div class="kpis">${lb.kpis.map(kpi).join("")}</div>
    <div class="section"><h2>What changed since the last snapshot</h2>
      <div class="cards3">${lb.what_changed.slice(0,3).map(changeCard).join("")}</div></div>
    <div class="section"><h2>Attributed revenue by channel</h2>
      <p class="note">Ranked by the data-driven model. Compare models under Model compare.</p>
      <div class="bars">${lb.money_by_channel.map(r=>`<div class="bar"><span class="nm">${esc(r.channel)}</span>
        <span class="track"><i style="width:${(r.revenue/mx*100).toFixed(1)}%"></i></span>
        <span class="amt">${money(r.revenue)}</span></div>`).join("")}</div></div>`;
}
function modelCompare(){
  const mc=BOARD.model_compare, L=mc.model_labels;
  const tag=s=>({disagree:['t-spread','Spread'],agree:['t-agree','Models agree'],thin:['t-thin','Not enough data']}[s]||['t-thin',s]);
  const row=r=>{const[cls,txt]=tag(r.status);const t=r.status==="disagree"?` ${r.spread_pts} pts`:"";
    const bars=mc.models.map(m=>`<div class="mm"><span>${esc(L[m])}</span><span class="mt"><i style="width:${(r.shares[m]*100).toFixed(0)}%"></i></span><b>${pct(r.shares[m])}</b></div>`).join("");
    return `<div class="mrow"><div class="ch">${esc(r.channel)}<span class="tag ${cls}">${txt}${t}</span></div><div class="mmodels">${bars}</div></div>`;};
  return `<div class="eyebrow">Model compare</div><h1>Three models, side by side</h1>
    <p class="sub">Last-touch, W-shaped, and data-driven credit per channel, with the spread between them flagged.</p>
    <div class="tabs"><span class="tab active">Credit by channel</span><span class="tab">Credit by campaign</span><span class="tab">Incrementality tests</span></div>
    <div class="mtable"><div class="mhead"><span>Channel</span><span>Share of credit, three models</span></div>
      ${mc.credit_by_channel.map(row).join("")}</div>`;
}
function agent(){
  const ra=BOARD.reallocation_agent, a=ra.autonomy;
  const rec=r=>{const done=APPROVED.has(r.id);
    return `<div class="rec">
    <div><h3>${esc(r.title)}</h3><p>${esc(r.rationale)}</p><div class="basis">Basis: ${esc((r.basis||[]).join("  ·  "))}</div></div>
    <div class="side2"><span class="conf">Confidence: ${r.confidence}</span>
      <button class="btn pri approve" data-id="${r.id}"${done?" disabled":""}>${done?"Approved ✓":(r.action==='Decrease'?'Approve cut':'Approve move')}</button></div></div>`;};
  return `<div class="eyebrow">Reallocation agent</div><h1>${ra.recommendations.length} pending recommendations</h1>
    <p class="sub">Proposed budget moves from current attribution and guardrails. Each requires approval before it takes effect.</p>
    ${ra.recommendations.map(rec).join("")||'<p class="sub">No material change this period.</p>'}
    <div class="section"><h2>Autonomy</h2>
      <div class="auto"><h3>Level ${a.level} of ${a.max_level} — propose and wait.</h3>
      <p>Once promoted, the agent can move up to ${money(a.weekly_cap)} per week, only within channels you allow. Every move is capped, reversible, and written to the decision ledger. ${a.match_rate.matched} of your last ${a.match_rate.of} approvals matched the agent's recommendation.</p></div></div>`;
}
function approveRec(id){
  const r=(BOARD.reallocation_agent.recommendations||[]).find(x=>x.id===id);
  if(!r||APPROVED.has(id)) return;
  APPROVED.add(id);
  const delta=(r.delta>=0?"+":"")+Number(r.delta).toLocaleString();
  LOCAL_APPROVALS.push({ts:new Date().toISOString(),
    event:`Approve: ${r.action} ${r.channel} ${delta}/wk`,
    actor:"HUMAN", result:"Logged to decision ledger"});
  render();
}
function ledger(){
  // Newest local approvals first, then the board's own ledger.
  const entries=LOCAL_APPROVALS.slice().reverse().concat(BOARD.decision_ledger||[]);
  const rows=entries.map(e=>`<tr><td class="when">${esc((e.ts||"").slice(11,19)||e.ts)}</td>
    <td class="ev">${esc(e.event)}</td><td><span class="actor ${e.actor}">${e.actor}</span></td><td>${esc(e.result)}</td></tr>`).join("");
  return `<div class="eyebrow">Decision ledger</div><h1>Agent decisions and approvals</h1>
    <p class="sub">What the agent observed, what it proposed, who approved it, and the result.</p>
    <div class="ltable"><table><thead><tr><th>When</th><th>Event</th><th>Actor</th><th>Result</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
const SCREENS={live:liveBoard,model:modelCompare,agent:agent,ledger:ledger};
function render(){chrome();document.getElementById("view").innerHTML=SCREENS[SCREEN]();}

document.querySelectorAll(".navitem").forEach(n=>n.addEventListener("click",()=>{
  SCREEN=n.dataset.screen;
  document.querySelectorAll(".navitem").forEach(x=>x.classList.toggle("active",x===n));
  render();
}));

// Delegated once on the persistent container so it survives re-renders.
document.getElementById("view").addEventListener("click",e=>{
  const b=e.target.closest(".approve");
  if(b&&b.dataset.id!=null) approveRec(Number(b.dataset.id));
});

// Export: build the workbook from the embedded bytes via a Blob (sandbox-safe).
document.getElementById("exportBtn").addEventListener("click",e=>{
  if(!EMBEDDED_PACK) return;                 // live server: follow the href instead
  e.preventDefault();
  const bytes=Uint8Array.from(atob(EMBEDDED_PACK),c=>c.charCodeAt(0));
  const url=URL.createObjectURL(new Blob([bytes],
    {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}));
  const a=document.createElement("a");
  a.href=url; a.download="DeltaStream_Pulse_Board_Pack.xlsx";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
});

async function poll(){
  try{const r=await fetch(API,{cache:"no-store"});if(r.ok){BOARD=await r.json();render();}}catch(e){}
}
BOARD.meta.recomputed_at=new Date().toISOString();
render();

setInterval(()=>{document.getElementById("recomputed").textContent="Recomputed "+ago(BOARD.meta.recomputed_at);},1000);
</script>
</body>
</html>
